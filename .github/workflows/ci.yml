name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      # Pin ruff so a future release adding a lint rule cannot turn a green
      # build red on its own. mutagen and tqdm come in via `pip install .`.
      - run: pip install . ruff==0.15.14
      - run: ruff check src/ scripts/ tests/
      - run: ruff format --check src/ scripts/ tests/
      - run: python -m unittest discover
